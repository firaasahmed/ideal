<link rel="stylesheet" href="components/modal/add-stock/add-stock.css" />

<div class="modal-overlay" id="add-stock-modal" style="display: none">
  <div class="modal-box" id="stock-modal-box">
    <header class="modal-header">
      <div>
        <div class="brand-title" id="product-brand-label"></div>
        <h2 class="title" id="product-name-label">Loading...</h2>
        <p class="subtitle">
          Base SKU:
          <span
            id="header-base-sku"
            style="font-family: monospace; color: #2563eb; font-weight: 600"
            >-</span
          >
        </p>
      </div>
      <button
        class="btn-text close-stock"
        style="font-size: 1.5rem; color: #94a3b8; text-decoration: none"
      >
        &times;
      </button>
    </header>

    <div class="modal-body layout">
      <div class="main-col">
        <div class="create-card-container">
          <div class="create-card" id="create-variant-section">
            <div class="create-header create-toggle">
              <div style="display: flex; flex-direction: column">
                <span class="create-title" style="margin-bottom: 0.25rem"
                  >Create New Variant</span
                >
                <span style="font-size: 0.75rem; color: #64748b"
                  >Add a new attribute combination</span
                >
              </div>
              <div style="margin-left: 1rem">
                <span
                  class="toggle-icon"
                  style="color: #94a3b8; font-size: 0.9rem"
                  >&#x25BC;</span
                >
              </div>
            </div>

            <div class="create-body">
              <div class="section-box" style="margin-bottom: 0">
                <label class="section-title">Variant Attributes</label>
                <div class="row">
                  <div class="col" style="width: 100%">
                    <div class="field">
                      <div id="create-var-attr-list">
                        <div
                          class="attr-row"
                          style="
                            display: flex;
                            align-items: center;
                            margin-bottom: 0.5rem;
                          "
                        >
                          <input
                            type="text"
                            class="input attr-key"
                            placeholder="Key (e.g. Size)"
                            style="
                              flex: 1;
                              margin-right: 0.75rem;
                              text-transform: uppercase;
                            "
                          />
                          <input
                            type="text"
                            class="input attr-val"
                            placeholder="Value (e.g. XL)"
                            style="flex: 1; text-transform: uppercase"
                          />
                          <button
                            type="button"
                            class="btn-text remove-attr"
                            style="
                              color: #ef4444;
                              font-size: 1.25rem;
                              text-decoration: none;
                              margin-left: 0.5rem;
                            "
                          >
                            &times;
                          </button>
                        </div>
                      </div>
                      <button
                        type="button"
                        class="btn-text"
                        id="add-stock-add-attr"
                        style="margin-top: 0.5rem"
                      >
                        + Add Attribute
                      </button>
                    </div>
                  </div>
                </div>

                <div class="row" style="margin-bottom: 0; margin-top: 1.5rem">
                  <button
                    class="btn btn-primary"
                    id="save-new-variant"
                    style="width: 100%"
                  >
                    Add Variant
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="list-wrapper">
          <div id="add-stock-list" class="variant-list"></div>
        </div>
      </div>

      <div class="side-col" id="batch-add-section">
        <div class="batch-panel">
          <div class="panel-header">Bulk Add</div>
          <div class="panel-body">
            <p class="panel-instructions">
              Check boxes on the left to apply these values in bulk.
            </p>
            <div id="batch-selected-labels" class="selected-tags"></div>

            <div class="row">
              <div class="field">
                <label>Supplier Name</label>
                <input
                  type="text"
                  id="batch-supp-name"
                  list="add-supplier-datalist"
                  class="input"
                  placeholder="e.g. Vendor Corp"
                />
                <datalist id="add-supplier-datalist"></datalist>
              </div>
            </div>
            <div class="row">
              <div class="field">
                <label>Delivery Date</label>
                <div style="display: flex">
                  <input
                    type="date"
                    id="batch-supp-date"
                    class="input"
                    style="flex: 1; margin-right: 0.5rem"
                  />
                  <button
                    type="button"
                    class="btn btn-secondary btn-today-batch"
                    style="padding: 0.25rem 0.75rem"
                  >
                    Today
                  </button>
                </div>
              </div>
            </div>
            <div class="row align-bottom">
              <div class="col">
                <div class="field">
                  <label>Supp. Price</label>
                  <input
                    type="number"
                    id="batch-supp-price"
                    class="input"
                    placeholder="0"
                  />
                </div>
              </div>
              <div class="col">
                <div class="field">
                  <label>Sell Price</label>
                  <input
                    type="number"
                    id="batch-sell-price"
                    class="input"
                    placeholder="0"
                  />
                </div>
              </div>
              <div class="col">
                <div class="field">
                  <label>Add Qty</label>
                  <input
                    type="number"
                    id="batch-qty"
                    class="input"
                    placeholder="0"
                    min="1"
                  />
                </div>
              </div>
            </div>

            <button
              class="btn btn-primary"
              id="action-batch-add"
              style="margin-top: 1.5rem; width: 100%"
              disabled
            >
              Select Variants
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn btn-secondary close-stock">Done</button>
    </footer>
  </div>
</div>
